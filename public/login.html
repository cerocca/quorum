<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖</text></svg>"/>
<title>Quorum — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
button, input, textarea, select{font-family:'Syne',sans-serif;}
:root{
  --bg:#f8f8f6;
  --surface:#ffffff;
  --surface-tint:#f3f3f0;
  --text:#111111;
  --text-soft:#3a3a3a;
  --muted:#888888;
  --muted-2:#b8b8b6;
  --border:#e5e5e5;
  --border-soft:#ececea;
  --accent:#e8ff5a;
  --danger:#ff5a5a;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Syne',sans-serif;
  --shadow-sm:0 1px 2px rgba(17,17,17,.04), 0 0 0 1px rgba(17,17,17,.04);
  --shadow-md:0 1px 2px rgba(17,17,17,.04), 0 4px 12px -2px rgba(17,17,17,.06), 0 0 0 1px rgba(17,17,17,.04);
}
html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  width:100%;
  max-width:380px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:32px;
  box-shadow:var(--shadow-md);
  margin:0 auto;
}
.card-header{
  display:flex;
  align-items:baseline;
  gap:10px;
  margin-bottom:6px;
}
.card-header h1{
  font-size:24px;
  font-weight:700;
  letter-spacing:-0.5px;
  font-family:var(--sans);
}
.card-header .tag{
  font-family:var(--mono);
  font-size:10px;
  background:var(--text);
  color:#fff;
  padding:2px 8px;
  border-radius:2px;
  font-weight:500;
  letter-spacing:.05em;
}
.subtitle{
  font-family:system-ui,sans-serif;
  font-size:13px;
  color:var(--muted);
  margin-bottom:24px;
}
.field{
  margin-bottom:16px;
}
.field label{
  display:block;
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:6px;
  font-weight:500;
}
.field input{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  padding:9px 12px;
  border-radius:4px;
  outline:none;
  transition:border .15s;
}
.field input:focus{border-color:var(--text)}
.field input::placeholder{color:var(--muted-2)}
.submit-btn{
  width:100%;
  background:var(--text);
  color:#fff;
  border:none;
  font-family:'Syne',sans-serif;
  font-size:14px;
  font-weight:700;
  padding:15px;
  border-radius:6px;
  cursor:pointer;
  letter-spacing:.03em;
  transition:all .15s;
  margin-top:8px;
}
.submit-btn:hover:not(:disabled){background:#333;transform:translateY(-1px)}
.submit-btn:disabled{background:#e5e5e3;color:var(--muted-2);cursor:not-allowed;transform:none}
.error{
  display:none;
  font-family:var(--mono);
  font-size:11px;
  color:var(--danger);
  margin-top:12px;
}
.error.visible{display:block}
</style>
</head>
<body>
<div class="card">
  <div style="margin-bottom:20px">
    <div style="display:flex; align-items:baseline; gap:10px; margin-bottom:8px">
      <h1 style="font-family:'Syne',sans-serif; font-size:28px; font-weight:700; letter-spacing:-0.5px; margin:0">⚖ Quorum</h1>
    </div>
    <span style="font-family:'IBM Plex Mono',monospace; font-size:10px; background:#111; color:#fff; padding:2px 8px; border-radius:2px; font-weight:500; letter-spacing:.05em">multi-agent decision panel</span>
  </div>
  <p style="font-family:system-ui,sans-serif; font-size:13px; color:#888; margin:0 0 28px 0">Sign in to continue</p>
  <form id="loginForm">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Sign in</button>
    <div class="error" id="errorMsg"></div>
  </form>
</div>
<script>
(async () => {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) { window.location.href = '/'; return; }
  } catch (_) {}
})();

const form = document.getElementById('loginForm');
const btn = document.getElementById('submitBtn');
const err = document.getElementById('errorMsg');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.classList.remove('visible');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (res.ok) {
      window.location.href = '/';
      return;
    }
    err.textContent = res.status === 401 ? 'Invalid credentials' : 'Something went wrong';
    err.classList.add('visible');
  } catch (_) {
    err.textContent = 'Something went wrong';
    err.classList.add('visible');
  }

  btn.disabled = false;
  btn.textContent = 'Sign in';
});
</script>
</body>
</html>
